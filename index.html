<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#4f46e5">
  <title>Frontend Interview Guide</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden font-sans">

  <!-- Mobile overlay -->
  <div id="overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed lg:static z-30 w-72 bg-slate-900 text-slate-100 flex flex-col h-screen overflow-y-auto flex-shrink-0 -translate-x-full lg:translate-x-0 transition-transform duration-300">

    <!-- Framework Switcher Header -->
    <div class="border-b border-slate-700/60 flex-shrink-0">
      <div class="p-4 pb-3 flex items-center gap-2.5">
        <div class="w-7 h-7 bg-indigo-600 rounded-md flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
          </svg>
        </div>
        <div>
          <h1 class="font-bold text-sm text-white leading-tight">Frontend Guide</h1>
          <p class="text-slate-400 text-xs">Interview Prep</p>
        </div>
      </div>
      <!-- Tabs -->
      <div class="px-3 pb-3 flex gap-1.5">
        <button id="tab-angular" onclick="switchFramework('angular')" class="framework-tab">
          <svg class="w-3.5 h-3.5" viewBox="0 0 250 250" fill="currentColor">
            <path d="M125 30L31.9 63.2l14.2 123.1L125 230l78.9-43.7 14.2-123.1z"/>
            <path fill="rgba(255,255,255,0.25)" d="M125 30v200l78.9-43.7 14.2-123.1L125 30z"/>
            <path fill="white" d="M125 52.1L66.8 182.6h21.7l11.7-29.2h49.4l11.7 29.2H183L125 52.1zm17 83.3h-34l17-40.9 17 40.9z"/>
          </svg>
          Angular
        </button>
        <button id="tab-react" onclick="switchFramework('react')" class="framework-tab">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/>
            <ellipse cx="12" cy="12" rx="10" ry="3.8"/>
            <ellipse cx="12" cy="12" rx="10" ry="3.8" transform="rotate(60 12 12)"/>
            <ellipse cx="12" cy="12" rx="10" ry="3.8" transform="rotate(120 12 12)"/>
          </svg>
          React
        </button>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="px-5 py-3 border-b border-slate-700/60 flex-shrink-0">
      <div class="flex justify-between text-xs text-slate-400 mb-1.5">
        <span>Progress</span>
        <span id="progress-count">0 / 0</span>
      </div>
      <div class="w-full bg-slate-700 rounded-full h-1.5">
        <div id="progress-bar" class="bg-indigo-500 h-1.5 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
    </div>

    <!-- Nav -->
    <nav id="module-nav" class="flex-1 py-4 px-3 overflow-y-auto space-y-1">
      <!-- Rendered by JS -->
    </nav>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Topbar -->
    <header class="bg-white border-b border-slate-200 px-5 lg:px-8 py-3.5 flex items-center gap-4 flex-shrink-0 z-10">
      <button onclick="toggleSidebar()" class="lg:hidden p-1.5 rounded-md text-slate-500 hover:bg-slate-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div id="breadcrumb" class="text-sm text-slate-400 flex items-center gap-2 truncate">
        <span class="text-slate-300">Frontend Guide</span>
      </div>
    </header>

    <!-- Content -->
    <main id="content-area" class="flex-1 overflow-y-auto">
      <!-- Rendered by JS -->
    </main>
  </div>

  <!-- Angular modules -->
  <script src="js/content.js"></script>
  <script src="js/modules/01-core-concepts.js"></script>
  <script src="js/modules/02-data-binding.js"></script>
  <script src="js/modules/03-directives.js"></script>
  <script src="js/modules/04-services-di.js"></script>
  <script src="js/modules/05-component-communication.js"></script>
  <script src="js/modules/06-lifecycle-hooks.js"></script>
  <script src="js/modules/07-routing.js"></script>
  <script src="js/modules/08-forms.js"></script>
  <script src="js/modules/09-pipes.js"></script>
  <script src="js/modules/10-observables-rxjs.js"></script>
  <script src="js/modules/11-http-api.js"></script>
  <script src="js/modules/12-change-detection.js"></script>
  <script src="js/modules/13-state-management.js"></script>
  <script src="js/modules/14-performance-optimization.js"></script>
  <script src="js/modules/15-testing.js"></script>
  <script src="js/modules/16-advanced-concepts.js"></script>
  <script src="js/modules/17-security.js"></script>
  <script src="js/modules/18-build-deployment.js"></script>
  <script src="js/modules/19-animations.js"></script>
  <script src="js/modules/20-i18n.js"></script>
  <script src="js/modules/21-accessibility.js"></script>
  <script src="js/modules/22-pwa.js"></script>
  <script src="js/modules/23-signals.js"></script>
  <script src="js/modules/24-standalone-components.js"></script>
  <script src="js/modules/25-template-syntax.js"></script>
  <script src="js/modules/26-ngzone.js"></script>
  <script src="js/modules/27-web-workers.js"></script>
  <script src="js/modules/28-angular-material.js"></script>
  <script src="js/modules/29-error-handling.js"></script>
  <script src="js/modules/30-deployment-devops.js"></script>
  <script src="js/modules/31-typescript-related.js"></script>
  <script src="js/modules/32-micro-frontends.js"></script>
  <script src="js/modules/33-memory-management.js"></script>
  <script src="js/modules/34-workspace-projects.js"></script>
  <script src="js/modules/35-custom-elements.js"></script>
  <script src="js/modules/36-ssr-hydration.js"></script>
  <script src="js/modules/37-version-specific-features.js"></script>
  <script src="js/modules/38-real-world-scenarios.js"></script>

  <!-- React modules -->
  <script src="js/react-content.js"></script>
  <script src="js/react-modules/01-core-concepts.js"></script>
  <script src="js/react-modules/02-jsx-rendering.js"></script>
  <script src="js/react-modules/03-hooks-state-effect.js"></script>
  <script src="js/react-modules/04-hooks-context-reducer.js"></script>
  <script src="js/react-modules/05-hooks-perf-custom.js"></script>
  <script src="js/react-modules/06-component-patterns.js"></script>
  <script src="js/react-modules/07-forms-events.js"></script>
  <script src="js/react-modules/08-react-router.js"></script>
  <script src="js/react-modules/09-state-management.js"></script>
  <script src="js/react-modules/10-performance.js"></script>
  <script src="js/react-modules/11-error-suspense.js"></script>
  <script src="js/react-modules/12-data-fetching.js"></script>
  <script src="js/react-modules/13-typescript.js"></script>
  <script src="js/react-modules/14-testing.js"></script>
  <script src="js/react-modules/15-react-18-19.js"></script>

  <script src="js/app.js"></script>
</body>
</html>
